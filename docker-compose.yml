services:
  powerguardian-connector:
    image: ghcr.io/powerguardianos/connectoros-docker:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8090:8090"
    volumes:
      - ./data:/data
      - /etc/nut:/etc/nut
    environment:
      PG_CONTROLLER_URL: "ws://10.0.0.40:8181/agent"
      PG_AGENT_KEY: "changeme"
      PG_WATCHTOWER_URL: "http://watchtower:8080"
      PG_WATCHTOWER_TOKEN: "pg-connector-token"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --http-api-update
      --http-api-token pg-connector-token
      --label-enable
      --interval 86400
    restart: unless-stopped
