services:
  powerguardian-connector:
    image: ghcr.io/powerguardianos/connectoros-docker:latest
    ports:
      - "8090:8090"
    volumes:
      - ./data:/data
      - /etc/nut:/etc/nut
    environment:
      - PG_CONTROLLER_URL=
      - PG_AGENT_KEY=
      - PG_WATCHTOWER_URL=http://watchtower:9000
      - PG_WATCHTOWER_TOKEN=changeme
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_TOKEN=changeme
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PORT=9000
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
    restart: unless-stopped
